<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="monitor_grad" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0284c7"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  
  <!-- Sleek Outer Rim -->
  <rect x="15" y="15" width="70" height="70" rx="16" stroke="url(#monitor_grad)" stroke-width="8" stroke-linecap="round" fill="none" />
  
  <!-- Dynamic Pulse Line -->
  <path d="M28 50 H36 L44 32 L56 68 L64 50 H72" stroke="url(#monitor_grad)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" />
  
  <!-- Status Dot (Active) -->
  <circle cx="78" cy="42" r="4" fill="#34d399" filter="url(#glow)" />
</svg>
